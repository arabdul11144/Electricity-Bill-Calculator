<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculate Consumption</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2 id="calculatorTitle">மின் நுகர்வு கணிப்பான்</h2>
        <label for="previousMeter" id="previousMeterLabel">முந்தைய மீட்டர் வாசிப்பு (kWh):</label>
        <input type="number" id="previousMeter" min="0" max="1000000" step="any" placeholder="முந்தைய மீட்டர் வாசிப்பினை உள்ளிடவும்">
        <label for="currentMeter" id="currentMeterLabel">தற்போதைய மீட்டர் வாசிப்பு (kWh):</label>
        <input type="number" id="currentMeter" min="0" max="1000000" step="any" placeholder="தற்போதைய மீட்டர் வாசிப்பினை உள்ளிடவும்">
        <button id="calculateConsumptionBtn" onclick="calculateConsumption()">நுகர்வினை கணக்கிடுங்கள்</button>
        <p id="consumptionResult"><span id="consumptionLabel">நுகர்வு:</span> <span id="consumption"></span> kWh</p>
        <p id="errorMessage" style="color: red; font-size:13px;"></p>
        <button id="calculateBillBtn" onclick="redirectToBillPage()" disabled>சிட்டையை கணக்கிடுங்கள்</button>
        <button id="backBtn" onclick="goBack()">பிரதான பக்கத்திற்கு செல்ல</button>
    </div>

    <footer>
        &copy; 2024 எளிதான மின்சார பில் கால்குலேட்டர் | திறமையான ஆற்றல் மேலாண்மைக்காக வடிவமைக்கப்பட்டுள்ளது
    </footer>

    <script src="../../shared/js/electricity-bill-app.js"></script>
    <script>
        ElectricityBillApp.initCalculatorPage({
            language: 'ta',
            homeUrl: '../Home/home.html',
            billUrl: 'bill.html'
        });
    </script>
</body>
</html>
